# set prefix key to ctrl+a until I have time to adapt
unbind C-b
set -g prefix C-s

# send the prefix to client inside window (ala nested sessions)
bind-key S send-prefix

# toggle last window like screen
#bind-key C-a last-window
# Make prefix C-a smart:
# C-a C-a: if window has >1 pane → last-pane, else → last-window
bind-key C-s if-shell -F '#{>:#{window_panes},1}' 'last-pane' 'last-window'
# if still does not work, last resort is https://www.reddit.com/r/tmux/comments/1lke549/i_made_a_script_to_quickly_focus_last_pane_across/

# navigate through windows like screen
bind-key n next
bind-key p prev

# Easier and faster switching between next/prev window
bind C-p previous-window
bind C-n next-window

# from https://github.com/tmux-plugins/tmux-pain-control/blob/master/pain_control.tmux
bind-key -r Left swap-window -d -t -1
bind-key -r Right swap-window -d -t +1
# Enable mouse
set -g mouse on

# Source .tmux.conf as suggested in `man tmux` (refresh/reread
bind R source-file '/home/kali/.config/tmux/tmux.conf' \; display-message "tmux.conf reloaded"


set -g history-limit 200000

#set -g renumber-windows on

set -g base-index 1
set -g pane-base-index 1

#bind-key - split-window -v  -c '#{pane_current_path}'
#bind-key \\ split-window -h  -c '#{pane_current_path}'
bind-key "|" split-window -h -c "#{pane_current_path}"
bind-key "\\" split-window -fh -c "#{pane_current_path}"
bind-key "-" split-window -v -c "#{pane_current_path}"
bind-key "_" split-window -fv -c "#{pane_current_path}"
bind-key "%" split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key "c" new-window -c "#{pane_current_path}"


# from course https://thoughtbot.com/upcase/videos/tmux-learning-more
bind-key -n C-h select-pane -L
bind-key -n C-j select-pane -D
bind-key -n C-k select-pane -U
bind-key -n C-l select-pane -R


bind-key b break-pane -d

#########################################
# copy mode

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Enter copy mode with prefix + Esc
bind Escape copy-mode

# Setup 'v' to begin selection as in Vim
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Use system clipboard on X11
set -g set-clipboard off

# Update default binding of `Enter` to also use copy-pipe
unbind -T copy-mode-vi Enter

# xclip instead of only tmux buffer
# this works also during mouse selection; just press "y" before releasing the mouse button
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -in"
#bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "xclip -selection clipboard -in"
#bind-key -T copy-mode-vi Enter send -X copy-selection-and-cancel

###############################################
# from course https://thoughtbot.com/upcase/videos/tmux-learning-more

# Sample quick-pane configurations
bind-key h split-window -h "htop"

# Fuzzy matching session navigation via fzf utility
bind C-j split-window -v "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"

# Prompted join-pane
bind-key j command-prompt -p "join pane from: "  "join-pane -h -s '%%'"

# Easily swap a pane (targeted by pane number) with the current pane
bind-key s display-panes\; command-prompt -p "pane #: "  "swap-pane -t '%%'"

# "break session" and "kill session" without exiting tmux
bind-key C-b send-keys 'tat && exit' 'C-m'
bind-key K run-shell 'tmux switch-client -n \; kill-session -t "$(tmux display-message -p "#S")" || tmux kill-session'

#################################################### 
# logging

# Auto-log all panes on attach + for every new pane
set-hook -g client-attached  'run-shell -b "~/.local/bin/tmux-log-pane"'
set-hook -g after-new-pane   'run-shell -b "~/.local/bin/tmux-log-pane #{hook_pane}"'

####################################################
# bar

setw -g window-status-current-format "#[reverse] #I:#W"
