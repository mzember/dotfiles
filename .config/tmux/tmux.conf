####################################################
# set prefix key
unbind C-b
set -g prefix C-s
# send the ^s original prefix to client inside window (ala nested sessions), or stop output in shells
bind S send-prefix

####################################################
# Navigation

# overall decision
# C-jhkl:       leave it to ViM
# C-s hl C-hl:  tmux windows
# M-jhkl:       tmux panes
#  ... if that will not work again due to Esc and escape-time issues, there is a plan B:
# C-M-jhkl:     tmux panes plan B
#               for now, tmux windows

####################################################
# Windows navigation

# navigate through windows like screen
#bind n next
#bind p prev
# Easier and faster switching between next/prev window
bind -r C-h previous-window
bind -r C-l next-window
bind -r h previous-window
bind -r l next-window
bind \; last-window
bind -n C-M-h prev
bind -n C-M-l next
bind -n "C-M-\;" last-window # does not work? no matter how I escape or quote it
# toggle last window like screen
bind C-s last-window
# Make prefix C-a smart:
# C-a C-a: if window has >1 pane → last-pane, else → last-window
#bind C-s if-shell -F '#{>:#{window_panes},1}' 'last-pane' 'last-window'
# if still does not work, last resort is https://www.reddit.com/r/tmux/comments/1lke549/i_made_a_script_to_quickly_focus_last_pane_across/
# but sometimes I want last-window even when I have multiple panes => let's discard it


####################################################
# Panes navigation
#
# from course https://thoughtbot.com/upcase/videos/tmux-learning-more
# but directly with Alt (Meta)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
# C-s ;       Move to the previously active pane (default)
bind -n M-\; last-pane
bind -N "display-panes shows numbers over panes" p display-panes

# for M- to work without Esc doing the same (happened a lot in ViM):
#set -g repeat-time 10
set -g escape-time 10

###################################################################
# Reorganizing windows

# from https://github.com/tmux-plugins/tmux-pain-control/blob/master/pain_control.tmux
bind -r Left swap-window -d -t -1
bind -r Right swap-window -d -t +1

bind b break-pane
bind B break-pane -d

###################################################################
# Other tweaks

# Enable mouse
set -g mouse on

# Source .tmux.conf as suggested in `man tmux` (refresh/reread
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"
bind E split-window -v 'vim ~/.config/tmux/tmux.conf' \; display-message "tmux.conf reloaded"


set -g history-limit 200000

#set -g renumber-windows on

set -g base-index 1
set -g pane-base-index 1

bind "|" split-window -fh -c "#{pane_current_path}"
bind "\\" split-window -h -c "#{pane_current_path}"
bind "-" split-window -v -c "#{pane_current_path}"
bind "_" split-window -fv -c "#{pane_current_path}"
#bind "%" split-window -h -c "#{pane_current_path}"
#bind '"' split-window -v -c "#{pane_current_path}"
bind "c" new-window -c "#{pane_current_path}"


#########################################
# copy mode

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Enter copy mode with prefix + Esc
bind Escape copy-mode

# Setup 'v' to begin selection as in Vim
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Use system clipboard on X11
set -g set-clipboard off

# Update default binding of `Enter` to also use copy-pipe
unbind -T copy-mode-vi Enter

# xclip instead of only tmux buffer
# this works also during mouse selection; just press "y" before releasing the mouse button
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -in"
#bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "xclip -selection clipboard -in"
#bind -T copy-mode-vi Enter send -X copy-selection-and-cancel

###############################################
# from course https://thoughtbot.com/upcase/videos/tmux-learning-more

# Sample quick-pane configurations
#bind h split-window -h "htop"

# Fuzzy matching session navigation via fzf utility
bind C-j split-window -v "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"

# Prompted join-pane
bind j command-prompt -p "join pane from: "  "join-pane -h -s '%%'"

# Easily swap a pane (targeted by pane number) with the current pane
bind s display-panes\; command-prompt -p "pane #: "  "swap-pane -t '%%'"

# "break session" and "kill session" without exiting tmux
bind C-b send-keys 'tat && exit' 'C-m'
bind K run-shell 'tmux switch-client -n \; kill-session -t "$(tmux display-message -p "#S")" || tmux kill-session'

#################################################### 
# logging

# Auto-log all panes on attach + for every new pane
set-hook -g client-attached  'run-shell -b "~/.local/bin/tmux-log-pane"'
set-hook -g after-split-window   'run-shell -b "~/.local/bin/tmux-log-pane #{hook_pane}"'
set-hook -g after-new-window   'run-shell -b "~/.local/bin/tmux-log-pane #{hook_pane}"'

####################################################
# bar

#setw -g window-status-current-format "#[reverse] #I:#W"
set -g status-left '#[bold][#S]#[default] '
set -g window-status-current-format '#[fg=black,bg=cyan] #I:#W#{?window_zoomed_flag, [ZOOM],} #[default]'
set -g status-right '#{?window_zoomed_flag,#[reverse] ZOOM #[default] ,} %H:%M '
